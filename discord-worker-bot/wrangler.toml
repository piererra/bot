name = "discord-worker-bot"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Create a KV namespace in the Cloudflare dashboard first
# (Workers & Pages -> KV -> Create namespace), then paste its ID below.
kv_namespaces = [
  { binding = "DATA", id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID" }
]
